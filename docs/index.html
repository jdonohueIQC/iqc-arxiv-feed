<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQC arXiv Feed — quant-ph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --hint: #9a9a9a;
      --accent: #185fa5;
      --accent-bg: #e6f1fb;
      --accent-text: #0c447c;
      --tag-bg: #efefef;
      --tag-text: #444;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a;
        --surface: #222224;
        --border: rgba(255,255,255,0.1);
        --text: #f0f0f0;
        --muted: #aaa;
        --hint: #777;
        --accent: #85b7eb;
        --accent-bg: #042c53;
        --accent-text: #85b7eb;
        --tag-bg: #2e2e30;
        --tag-text: #ccc;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 0 0 4rem;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 1.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-row {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 { font-size: 18px; font-weight: 600; }
    header p { font-size: 13px; color: var(--muted); }

    .rss-link {
      margin-left: auto;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      white-space: nowrap;
    }
    .rss-link:hover { background: var(--tag-bg); }

    .controls {
      max-width: 800px;
      margin: 1rem auto 0;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls input[type="search"] {
      flex: 1;
      min-width: 180px;
      font-size: 14px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .controls input[type="search"]:focus { border-color: var(--accent); }

    .controls select {
      font-size: 13px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
    }

    main { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; }

    #status { font-size: 13px; color: var(--muted); margin-bottom: 1rem; min-height: 20px; }

    .paper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
    }

    .paper-top {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }
    .pill-iqc { background: var(--accent-bg); color: var(--accent-text); }
    .pill-date { background: var(--tag-bg); color: var(--tag-text); }
    .pill-id { background: var(--tag-bg); color: var(--hint); font-family: monospace; margin-left: auto; }

    .paper-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .paper-title a { color: var(--text); text-decoration: none; }
    .paper-title a:hover { color: var(--accent); }

    .paper-authors {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      line-height: 1.5;
    }
    .paper-authors .iqc-author { color: var(--accent); font-weight: 500; }

    .paper-affs {
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 6px;
    }

    .paper-abstract {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .paper-abstract.expanded { -webkit-line-clamp: unset; }

    .expand-btn {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 0;
      margin-top: 2px;
    }

    .links { margin-top: 8px; display: flex; gap: 10px; }
    .links a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
    .spinner { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }

    footer {
      max-width: 800px;
      margin: 2rem auto 0;
      padding: 0 1rem;
      font-size: 12px;
      color: var(--hint);
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>IQC arXiv Feed</h1>
      <p>quant-ph papers from the Institute for Quantum Computing, University of Waterloo</p>
    </div>
    <a class="rss-link" href="feed.xml">&#x25A3; RSS feed</a>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search titles, authors, abstracts…" oninput="render()">
    <select id="sort" onchange="render()">
      <option value="date">Newest first</option>
      <option value="title">Title A–Z</option>
    </select>
  </div>
</header>

<main>
  <div id="status">Loading…</div>
  <div id="feed"></div>
</main>

<footer id="footer"></footer>

<script>
let papers = [];

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPaper(p) {
  const authorHtml = (p.authors || []).map(a => {
    const isIQC = (p.iqc_authors || []).includes(a.name);
    return `<span class="${isIQC ? 'iqc-author' : ''}">${esc(a.name)}</span>`;
  }).join(', ');

  const allAffs = [...new Set((p.authors || []).flatMap(a => a.affiliations || []))].filter(Boolean);
  const affHtml = allAffs.length
    ? `<div class="paper-affs">${allAffs.map(esc).join(' · ')}</div>`
    : '';

  const arxivId = (p.id || '').replace(/v\d+$/, '');

  return `
    <div class="paper">
      <div class="paper-top">
        <span class="pill pill-iqc">IQC</span>
        <span class="pill pill-date">${formatDate(p.published)}</span>
        <span class="pill pill-id">${esc(arxivId)}</span>
      </div>
      <div class="paper-title"><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></div>
      <div class="paper-authors">${authorHtml}</div>
      ${affHtml}
      <div class="paper-abstract" id="abs-${esc(arxivId)}">${esc(p.summary)}</div>
      <button class="expand-btn" onclick="toggleAbs('${esc(arxivId)}', this)">Show more</button>
      <div class="links">
        <a href="${esc(p.url)}" target="_blank" rel="noopener">Abstract</a>
        <a href="${esc(p.pdf_url)}" target="_blank" rel="noopener">PDF</a>
      </div>
    </div>`;
}

function toggleAbs(id, btn) {
  const el = document.getElementById('abs-' + id);
  if (el.classList.toggle('expanded')) {
    btn.textContent = 'Show less';
  } else {
    btn.textContent = 'Show more';
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;
  const feed = document.getElementById('feed');
  const status = document.getElementById('status');

  let filtered = papers;
  if (q) {
    filtered = papers.filter(p => {
      const haystack = [
        p.title, p.summary,
        ...(p.authors || []).map(a => a.name),
        ...(p.iqc_authors || []),
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }

  if (sort === 'title') {
    filtered = [...filtered].sort((a, b) => (a.title || '').localeCompare(b.title || ''));
  }

  status.textContent = filtered.length === papers.length
    ? `${papers.length} papers`
    : `${filtered.length} of ${papers.length} papers`;

  if (!filtered.length) {
    feed.innerHTML = '<div class="empty">No papers match your search.</div>';
    return;
  }

  feed.innerHTML = filtered.map(renderPaper).join('');
}

async function load() {
  const status = document.getElementById('status');
  const footer = document.getElementById('footer');
  try {
    const res = await fetch('papers.json?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    papers = data.papers || [];
    const updated = data.updated ? new Date(data.updated).toLocaleString('en-CA', { dateStyle: 'medium', timeStyle: 'short' }) : '';
    footer.textContent = `Last updated: ${updated} · Source: arXiv.org · Filtered for IQC/University of Waterloo affiliation`;
    render();
  } catch (e) {
    status.textContent = 'Could not load papers.json — run the GitHub Action first, or open this page after the first scheduled run.';
  }
}

load();
</script>
</body>
</html>
