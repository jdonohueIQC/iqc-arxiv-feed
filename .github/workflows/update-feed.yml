name: Update IQC arXiv Feed

on:
  schedule:
    # Runs at 08:00 UTC daily — arXiv posts new submissions around 00:00–02:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # also allows manual trigger from the GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch papers and update feed
        run: python fetch_papers.py

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update IQC arXiv feed [$(date -u '+%Y-%m-%d')]"
          git push
